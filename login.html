<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:
            linear-gradient(
            rgba(60,0,90,0.6),
            rgba(10,0,40,0.7)),
            url('https://images.unsplash.com/photo-1515879218367-8466d910aaa4?q=80&w=1920');
            background-size:cover;
            background-position:center;
            overflow:hidden;
        }

        .login-box{
            width:420px;
            padding:50px;
            border-radius:30px;
            background:rgba(15,15,30,0.55);
            backdrop-filter:blur(15px);
            box-shadow:0px 0px 40px rgba(170,0,255,0.4);
            border:1px solid rgba(255,255,255,0.1);
            color:white;
        }

        .login-box h1{
            text-align:center;
            font-size:55px;
            margin-bottom:40px;
            color:#ffffff;
            text-shadow:0px 0px 20px #d946ef;
        }

        .input-box{
            margin-top:25px;
        }

        .input-box input{
            width:100%;
            padding:16px;
            border:none;
            outline:none;
            border-radius:15px;
            background:rgba(255,255,255,0.08);
            color:white;
            font-size:17px;
            border:1px solid rgba(255,255,255,0.1);
            transition:0.3s;
        }

        .input-box input:focus{
            border:1px solid #d946ef;
            box-shadow:0px 0px 20px rgba(217,70,239,0.6);
        }

        .input-box input::placeholder{
            color:#d1d5db;
        }

        .login-btn{
            width:100%;
            margin-top:35px;
            padding:16px;
            border:none;
            border-radius:18px;
            background:linear-gradient(90deg,#9333ea,#ec4899);
            color:white;
            font-size:20px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
            box-shadow:0px 0px 25px rgba(236,72,153,0.5);
        }

        .login-btn:hover{
            transform:scale(1.03);
            box-shadow:0px 0px 40px rgba(236,72,153,0.8);
        }

        .error{
            color:#ff4d6d;
            margin-top:20px;
            text-align:center;
            font-weight:bold;
        }

    </style>

</head>

<body>

    <div class="login-box">

        <h1>LOGIN</h1>

        <form th:action="@{/procesar-login}"
              method="post">

            <div class="input-box">

                <input type="text"
                       name="usuario"
                       placeholder="Usuario"
                       required>

            </div>

            <div class="input-box">

                <input type="password"
                       name="password"
                       placeholder="Contraseña"
                       required>

            </div>

            <button type="submit"
                    class="login-btn">

                Entrar al Sistema

            </button>

        </form>

        <p class="error"
           th:if="${error}"
           th:text="${error}">
        </p>

    </div>

</body>
</html>
