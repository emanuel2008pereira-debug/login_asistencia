<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Editar Alumno</title>

    <style>

        body{
            font-family:Arial;
            background:#f4f4f4;
            padding:40px;
        }

        .box{
            background:white;
            padding:30px;
            border-radius:20px;
            width:400px;
            margin:auto;
        }

        h1{
            text-align:center;
            color:#243b55;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:15px;
            border-radius:10px;
            border:1px solid #ccc;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:20px;
            border:none;
            border-radius:10px;
            background:#243b55;
            color:white;
            cursor:pointer;
        }

    </style>

</head>

<body>

    <div class="box">

        <h1>Editar Alumno</h1>

        <form action="/guardar-alumno"
              method="post">

            <input type="hidden"
                   name="id"
                   th:value="${alumno.id}">

            <input type="text"
                   name="nombre"
                   th:value="${alumno.nombre}"
                   placeholder="Nombre"
                   required>

            <input type="text"
                   name="apellido"
                   th:value="${alumno.apellido}"
                   placeholder="Apellido"
                   required>

            <input type="email"
                   name="correo"
                   th:value="${alumno.correo}"
                   placeholder="Correo"
                   required>

            <input type="text"
                   name="telefono"
                   th:value="${alumno.telefono}"
                   placeholder="Telefono"
                   required>

            <input type="text"
                   name="usuario"
                   th:value="${alumno.usuario}"
                   placeholder="Usuario"
                   required>

            <input type="text"
                   name="carnet"
                   th:value="${alumno.carnet}"
                   placeholder="Carnet"
                   required>

            <input type="text"
                   name="grado"
                   th:value="${alumno.grado}"
                   placeholder="Grado"
                   required>

            <input type="text"
                   name="seccion"
                   th:value="${alumno.seccion}"
                   placeholder="Sección"
                   required>

            <button type="submit">
                Actualizar Alumno
            </button>

        </form>

    </div>

</body>
</html>
