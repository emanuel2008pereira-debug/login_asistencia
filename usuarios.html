<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>
        Gestión Usuarios
    </title>

    <style>

        body{

            background:#020617;
            color:white;
            font-family:Arial;

            padding:40px;
        }

        h1{

            font-size:50px;

            margin-bottom:40px;

            color:white;

            text-shadow:
                0 0 10px #a855f7,
                0 0 25px #9333ea;
        }

        .contenedor{

            width:500px;

            background:rgba(255,255,255,0.05);

            padding:40px;

            border-radius:25px;

            backdrop-filter:blur(10px);

            border:1px solid rgba(255,255,255,0.08);

            box-shadow:
                0 0 25px rgba(168,85,247,0.3);
        }

        input{

            width:100%;

            padding:18px;

            margin-top:20px;

            border:none;

            border-radius:15px;

            background:#111827;

            color:white;

            font-size:18px;
        }

        input::placeholder{

            color:#94a3b8;
        }

        button{

            width:100%;

            margin-top:25px;

            padding:18px;

            border:none;

            border-radius:15px;

            background:#9333ea;

            color:white;

            font-size:20px;

            font-weight:bold;

            cursor:pointer;

            transition:0.3s;
        }

        button:hover{

            background:#7e22ce;

            transform:scale(1.03);
        }

        .volver{

            position:absolute;

            top:30px;
            right:40px;

            text-decoration:none;

            color:white;

            background:#ff0055;

            padding:15px 25px;

            border-radius:15px;

            font-weight:bold;

            box-shadow:
                0 0 10px #ff0055,
                0 0 25px #ff0055;
        }

    </style>

</head>

<body>

    <a th:href="@{/dashboard}"
       class="volver">

        Volver

    </a>

    <h1>
        Gestión de Usuarios
    </h1>

    <div class="contenedor">

        <form action="/guardar-usuario"
              method="post">

            <input type="text"
                   name="usuario"
                   placeholder="Usuario"
                   required>

            <input type="password"
                   name="password"
                   placeholder="Contraseña"
                   required>

            <button type="submit">

                Guardar Usuario

            </button>

        </form>

    </div>

</body>
</html>
